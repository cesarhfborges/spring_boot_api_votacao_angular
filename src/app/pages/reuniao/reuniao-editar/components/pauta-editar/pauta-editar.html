<form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="flex flex-col gap-4 pt-2">
        <div class="flex flex-col gap-4 pt-2">
            <div class="flex flex-col gap-1">
                <label for="titulo" class="text-sm font-semibold">Título</label>
                <input
                    pInputText
                    id="titulo"
                    placeholder="Ex: Aprovação de Contas 2025"
                    formControlName="titulo"
                />
            </div>
            <div class="flex flex-col gap-1">
                <label for="descricao" class="text-sm font-semibold">Descrição / Contexto</label>
                <textarea
                    pInputTextarea
                    id="descricao"
                    rows="4"
                    placeholder="Detalhes que o eleitor precisa saber..."
                    formControlName="descricao"
                ></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-4">
                    <span class="text-sm font-semibold">Descrição / Contexto</span>
                    <div class="flex flex-col gap-4">
                        @for (tipoVoto of tipoVotos; track $index) {
                            <div class="flex items-center">
                                <p-radio-button
                                    name="tipoVoto"
                                    [value]="tipoVoto.value"
                                    formControlName="tipoVoto"
                                    inputId="tipoVoto{{ $index }}"
                                />
                                <label for="tipoVoto{{ $index }}" class="ml-2">{{ tipoVoto.label }}</label>
                            </div>
                        }
                    </div>
                </div>
                @if (form.get('limiteSelecoes')) {
                    <div class="flex-auto">
                        <label class="mb-2 block text-sm font-semibold" for="horizontal">Limite de
                            seleção</label>
                        <p-input-number
                            formControlName="limiteSelecoes"
                            [showButtons]="true"
                            buttonLayout="horizontal"
                            inputId="horizontal"
                            [step]="1"
                            [min]="1"
                            mode="decimal"
                        >
                            <ng-template #incrementbuttonicon>
                                <span class="pi pi-plus"></span>
                            </ng-template>
                            <ng-template #decrementbuttonicon>
                                <span class="pi pi-minus"></span>
                            </ng-template>
                        </p-input-number>
                    </div>
                }
            </div>
        </div>
        <div class="flex justify-between border-t border-surface pt-4">
            <p-button
                type="button"
                label="Cancelar"
                icon="pi pi-times"
                [text]="true"
                severity="secondary"
                (click)="close()"
            />
            <p-button type="submit" label="Salvar" icon="pi pi-check" />
        </div>
    </div>
</form>
