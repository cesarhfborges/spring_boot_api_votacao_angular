<div
    role="button"
    tabindex="0"
    (click)="selecionar()"
    (keydown.enter)="selecionar()"
    (keydown.space)="selecionar(); $event.preventDefault()"
    [class]="
        'group cursor-pointer rounded-lg border p-4 transition-all ' +
        (
            estaSelecionada()
                ? 'border-primary bg-primary/10 hover:bg-primary/20 shadow-sm'
                : 'border-surface-200 hover:border-primary hover:bg-primary/20'
        )
    ">

    <div class="flex items-start justify-between gap-3">

        <div class="flex-1">
            <h3 class="font-semibold text-surface-900 !m-0">
                {{ pauta().titulo }}
            </h3>

            <p class="mt-1 text-xs text-surface-500">
                {{ pauta().dataHoraAbertura | date :'dd/MM/yyyy HH:mm' }}
            </p>
        </div>

        @switch (pauta().status) {
            @case ('AGUARDANDO') {
                <p-tag severity="info" value="Agendada" class="border border-sky-600" />
            }
            @case ('ABERTA') {
                <p-tag severity="warn" value="Em andamento" class="border border-amber-800">
                    <span class="relative flex size-3">
                      <span
                          class="absolute inline-flex h-full w-full animate-ping rounded-full bg-green-400 opacity-75"
                      ></span>
                      <span class="relative inline-flex size-3 rounded-full bg-green-500"></span>
                    </span>
                </p-tag>
            }
            @case ('ENCERRADA') {
                <p-tag severity="success" value="Encerrada" class="border border-green-600" />
            }
            @case ('CANCELADA') {
                <p-tag severity="danger" value="Cancelada" class="border border-red-600" />
            }
            @default {
                <p-tag
                    severity="secondary"
                    [value]="pauta().status" />
            }
        }
    </div>

    <br>

    <p class="mt-3 text-sm text-surface-700 dark:text-surface-300">
        {{ pauta().descricao }}
    </p>

    <div
        class="flex border-t border-dashed pt-3 transition-colors"
        [class.border-primary]="estaSelecionada()"
        [class.border-surface-200]="!estaSelecionada()"
        [class.group-hover:border-primary]="!estaSelecionada()"
    >
        <div class="flex-1">
            <p-button
                icon="pi pi-pencil"
                severity="info"
                [text]="true"
                size="small"
                (onClick)="editar($event)"
            />
            <p-button
                icon="pi pi-trash"
                severity="danger"
                [text]="true"
                size="small"
                (onClick)="excluir($event)"
            />
        </div>
        <div class="flex-1 flex justify-end">
            <p-button
                icon="pi pi-pencil"
                severity="info"
                [text]="true"
                size="small"
                (onClick)="editar($event)"
            />
            <p-button
                icon="pi pi-trash"
                severity="danger"
                [text]="true"
                size="small"
                (onClick)="excluir($event)"
            />
        </div>
    </div>
</div>
